<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0a0b">
    <title>Коллекция фильмов</title>
    <style>
        :root {
            --bg: #0a0a0b;
            --surface: #141416;
            --surface-2: #1c1c1f;
            --text: #ececee;
            --text-2: #9d9da4;
            --text-3: #63636b;
            --accent: #b8944b;
            --accent-soft: #d4b96a;
            --accent-dim: rgba(184, 148, 75, 0.18);
            --r-sm: 12px;
            --r-md: 18px;
            --r-full: 100px;
            --safe-bottom: env(safe-area-inset-bottom, 16px);
            --ease: 0.35s cubic-bezier(0.25, 0.1, 0.25, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            min-height: 100dvh;
            color: var(--text);
            display: flex;
            justify-content: center;
            padding: 0;
        }

        .app {
            width: 100%;
            max-width: 560px;
            padding: 28px 18px calc(28px + var(--safe-bottom));
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--text);
        }

        .btn-settings {
            width: 38px;
            height: 38px;
            border-radius: var(--r-full);
            background: var(--surface);
            border: 1px solid rgba(255,255,255,0.04);
            color: var(--text-3);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--ease);
            font-family: inherit;
            flex-shrink: 0;
        }

        .btn-settings:active {
            background: var(--surface-2);
            color: var(--accent);
        }

        .sync-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 18px;
            font-size: 0.7rem;
            color: var(--text-3);
            letter-spacing: 1px;
        }

        .sync-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #4ade80;
            flex-shrink: 0;
        }

        .sync-dot.loading {
            background: #f59e0b;
            animation: pulse 1s infinite;
        }

        .sync-dot.error {
            background: #ef4444;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 16px;
        }

        .stat-card {
            background: var(--surface);
            border-radius: var(--r-md);
            padding: 12px 8px;
            text-align: center;
        }

        .stat-value {
            display: block;
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--accent);
        }

        .stat-label {
            font-size: 0.6rem;
            font-weight: 700;
            color: var(--text-3);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .filter-row {
            display: flex;
            gap: 6px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .filter-chip {
            padding: 8px 16px;
            background: var(--surface);
            color: var(--text-2);
            border: 1px solid rgba(255,255,255,0.04);
            border-radius: var(--r-full);
            cursor: pointer;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            border: none;
            font-family: inherit;
        }

        .filter-chip.active {
            color: #0a0a0b;
            background: var(--accent);
        }

        .card {
            background: var(--surface);
            border-radius: var(--r-md);
            padding: 16px;
            margin-bottom: 14px;
        }

        .card label {
            display: block;
            font-size: 0.65rem;
            font-weight: 700;
            color: var(--text-3);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 4px;
        }

        input[type="text"],
        input[type="number"],
        input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            background: var(--surface-2);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: var(--r-full);
            color: var(--text);
            font-size: 0.85rem;
            outline: none;
            margin-bottom: 8px;
            font-family: inherit;
        }

        .search-indicator {
            display: none;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: var(--surface-2);
            border-radius: var(--r-full);
            font-size: 0.7rem;
            color: var(--text-3);
            margin-bottom: 8px;
        }

        .search-indicator.visible {
            display: flex;
        }

        .search-indicator .mini-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--accent);
            animation: pulse 1.2s infinite;
        }

        .search-indicator.found {
            color: var(--accent);
            cursor: pointer;
            transition: var(--ease);
        }

        .search-indicator.found:hover {
            background: var(--accent-dim);
        }

        .search-indicator.found .mini-dot {
            background: #4ade80;
            animation: none;
        }

        .radio-row {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }

        .radio-btn {
            flex: 1;
        }

        .radio-btn input {
            display: none;
        }

        .radio-btn label {
            display: block;
            padding: 10px;
            text-align: center;
            background: var(--surface-2);
            border-radius: var(--r-full);
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-2);
            cursor: pointer;
            letter-spacing: 1px;
        }

        .radio-btn input:checked + label {
            background: var(--accent);
            color: #0a0a0b;
        }

        .series-fields {
            display: none;
            gap: 8px;
            margin-bottom: 8px;
        }

        .series-fields.visible {
            display: flex;
        }

        .series-fields input {
            flex: 1;
            margin-bottom: 0;
        }

        .add-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .btn-icon {
            width: 44px;
            height: 44px;
            border-radius: var(--r-full);
            background: var(--surface-2);
            color: var(--text-2);
            border: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: var(--ease);
            font-family: inherit;
        }

        .btn-icon:active {
            transform: scale(0.94);
        }

        .btn-icon.has-image {
            color: var(--accent-soft);
            border-color: var(--accent);
            background: var(--accent-dim);
        }

        .btn-primary {
            flex: 1;
            padding: 13px 24px;
            border-radius: var(--r-full);
            background: var(--accent);
            color: #0a0a0b;
            border: none;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 0.4px;
            transition: var(--ease);
            font-family: inherit;
        }

        .btn-primary:active {
            transform: scale(0.97);
            background: var(--accent-soft);
        }

        .preview-area {
            margin-bottom: 12px;
        }

        .preview-wrapper {
            position: relative;
            display: inline-block;
            border-radius: var(--r-sm);
            overflow: hidden;
            animation: fadeIn 0.4s var(--ease);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .preview-wrapper img {
            max-height: 110px;
            display: block;
            border-radius: var(--r-sm);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .preview-remove {
            position: absolute;
            top: 6px;
            right: 6px;
            width: 26px;
            height: 26px;
            border-radius: var(--r-full);
            background: rgba(10, 10, 11, 0.85);
            border: 1px solid rgba(255,255,255,0.12);
            color: var(--text-2);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: inherit;
            font-size: 0.8rem;
        }

        .preview-remove:active {
            background: rgba(190, 60, 60, 0.8);
        }

        .movie-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--surface);
            border-radius: var(--r-md);
            padding: 12px 14px;
            margin-bottom: 7px;
            cursor: default;
            position: relative;
        }

        .movie-item.watched {
            opacity: 0.55;
        }

        .movie-poster {
            width: 40px;
            height: 56px;
            border-radius: 10px;
            object-fit: cover;
            background: var(--surface-2);
            flex-shrink: 0;
            cursor: pointer;
        }

        .movie-info {
            flex: 1;
            min-width: 0;
        }

        .movie-name {
            font-weight: 700;
            font-size: 0.85rem;
            word-break: break-word;
        }

        .movie-item.watched .movie-name {
            text-decoration: line-through;
            text-decoration-color: var(--accent);
        }

        .movie-meta {
            font-size: 0.65rem;
            color: var(--text-3);
            margin-top: 2px;
            display: flex;
            gap: 6px;
            align-items: center;
            flex-wrap: wrap;
        }

        .badge {
            display: inline-block;
            padding: 2px 7px;
            border-radius: var(--r-full);
            background: rgba(184,148,75,0.2);
            color: var(--accent);
            font-size: 0.6rem;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .btn-sm {
            width: 34px;
            height: 34px;
            border-radius: var(--r-full);
            border: none;
            background: transparent;
            color: var(--text-3);
            font-size: 1.1rem;
            cursor: pointer;
            flex-shrink: 0;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-sm:active {
            background: rgba(200,60,60,0.2);
            color: #d47878;
        }

        .btn-edit {
            color: var(--text-3);
        }

        .btn-edit:active {
            background: rgba(184,148,75,0.15);
            color: var(--accent);
        }

        .toast {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 20px;
            border-radius: var(--r-full);
            background: var(--surface-2);
            color: var(--text);
            font-size: 0.75rem;
            font-weight: 700;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            letter-spacing: 0.5px;
        }

        .toast.show {
            opacity: 1;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.94);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal-overlay img {
            max-width: 92%;
            max-height: 85%;
            border-radius: var(--r-sm);
            animation: zoomIn 0.3s ease;
        }

        @keyframes zoomIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-close {
            position: absolute;
            top: 18px;
            right: 22px;
            width: 40px;
            height: 40px;
            border-radius: var(--r-full);
            background: rgba(255,255,255,0.05);
            border: none;
            color: var(--text-2);
            font-size: 1.4rem;
            cursor: pointer;
            font-family: inherit;
        }

        .edit-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 3000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .edit-modal.show {
            display: flex;
        }

        .edit-card {
            background: var(--surface);
            border-radius: var(--r-md);
            padding: 20px;
            width: 100%;
            max-width: 400px;
            animation: fadeIn 0.3s ease;
        }

        .edit-card h3 {
            font-size: 0.9rem;
            font-weight: 700;
            margin-bottom: 14px;
            color: var(--text);
            letter-spacing: 1px;
        }

        .edit-card .btn-row {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .btn-cancel {
            flex: 1;
            padding: 12px;
            border-radius: var(--r-full);
            background: var(--surface-2);
            color: var(--text-2);
            border: none;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 700;
            font-family: inherit;
        }

        .btn-save {
            flex: 1;
            padding: 12px;
            border-radius: var(--r-full);
            background: var(--accent);
            color: #0a0a0b;
            border: none;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 700;
            font-family: inherit;
        }

        .btn-logout {
            width: 100%;
            padding: 10px;
            border-radius: var(--r-full);
            background: transparent;
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
            font-size: 0.75rem;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 0.5px;
            font-family: inherit;
            margin-top: 8px;
        }

        .btn-logout:active {
            background: rgba(239, 68, 68, 0.1);
        }
    </style>
</head>
<body>
    <div class="app" id="app">
        <div class="header">
            <h1>Коллекция</h1>
            <button class="btn-settings" onclick="toggleSettings()" title="Настройки синхронизации">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"/>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                </svg>
            </button>
        </div>

        <div class="sync-bar">
            <span class="sync-dot" id="syncDot"></span>
            <span id="syncText">Загрузка...</span>
        </div>

        <div id="setupCard" class="card" style="display:none;">
            <label>Токен GitHub</label>
            <input type="password" id="tokenInput" placeholder="ghp_...">
            <label>Репозиторий</label>
            <input type="text" id="repoInput" placeholder="username/repository">
            <button class="btn-primary" onclick="saveConfig()" style="margin-bottom:0;">Подключить</button>
            <button class="btn-logout" onclick="logoutConfig()" style="display:none;" id="logoutBtn">Отключить синхронизацию</button>
            <p style="font-size:0.6rem;color:var(--text-3);margin-top:8px;text-align:center;line-height:1.4;">
                Токен: Settings → Developer settings → Tokens (classic)<br>Нужна галочка repo
            </p>
        </div>

        <div id="mainContent" style="display:none;">
            <div class="stats-row">
                <div class="stat-card"><span class="stat-value" id="statTotal">0</span><span class="stat-label">Всего</span></div>
                <div class="stat-card"><span class="stat-value" id="statWatched">0</span><span class="stat-label">Просм</span></div>
                <div class="stat-card"><span class="stat-value" id="statUnwatched">0</span><span class="stat-label">В планах</span></div>
            </div>

            <div class="filter-row" id="filterRow">
                <button class="filter-chip active" onclick="setFilter('all', this)">Все</button>
                <button class="filter-chip" onclick="setFilter('unwatched', this)">К просмотру</button>
                <button class="filter-chip" onclick="setFilter('watched', this)">Просмотрено</button>
                <button class="filter-chip" onclick="setFilter('movies', this)">Фильмы</button>
                <button class="filter-chip" onclick="setFilter('series', this)">Сериалы</button>
            </div>

            <div class="card">
                <label>Название</label>
                <input type="text" id="titleInput" placeholder="Введите название фильма или сериала" maxlength="200">

                <div class="search-indicator" id="searchIndicator" onclick="applyFoundTitle()">
                    <span class="mini-dot"></span>
                    <span id="searchStatus"></span>
                </div>

                <label>Тип</label>
                <div class="radio-row">
                    <div class="radio-btn">
                        <input type="radio" name="type" id="typeMovie" value="movie" checked>
                        <label for="typeMovie">Фильм</label>
                    </div>
                    <div class="radio-btn">
                        <input type="radio" name="type" id="typeSeries" value="series">
                        <label for="typeSeries">Сериал</label>
                    </div>
                </div>

                <div class="series-fields" id="seriesFields">
                    <input type="number" id="seriesTotalInput" placeholder="Всего серий" min="1">
                    <input type="number" id="seriesWatchedInput" placeholder="Просмотрено" min="0">
                </div>

                <div class="preview-area" id="imagePreviewArea" style="display:none;">
                    <div class="preview-wrapper">
                        <img id="previewImg" src="" alt="Предпросмотр">
                        <button class="preview-remove" onclick="clearImage()">✕</button>
                    </div>
                </div>

                <label>Постер</label>
                <div class="add-actions">
                    <input type="file" id="imageInput" accept="image/*" hidden>
                    <button type="button" class="btn-icon" id="imageButton" onclick="document.getElementById('imageInput').click()" title="Добавить постер">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="3" width="18" height="18" rx="3"/>
                            <circle cx="8.5" cy="8.5" r="1.5"/>
                            <path d="M21 15l-5-5L5 21"/>
                        </svg>
                    </button>
                    <button class="btn-primary" onclick="addMovie()">Добавить</button>
                </div>
            </div>

            <div id="movieContainer"></div>
        </div>
    </div>

    <div class="toast" id="toast"></div>
    <div class="edit-modal" id="editModal">
        <div class="edit-card">
            <h3>Редактировать</h3>
            <label style="font-size:0.65rem;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:2px;margin-bottom:4px;display:block;">Название</label>
            <input type="text" id="editTitleInput" maxlength="200">
            
            <label style="font-size:0.65rem;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:2px;margin-bottom:4px;display:block;margin-top:8px;">Тип</label>
            <div class="radio-row">
                <div class="radio-btn">
                    <input type="radio" name="editType" id="editTypeMovie" value="movie">
                    <label for="editTypeMovie">Фильм</label>
                </div>
                <div class="radio-btn">
                    <input type="radio" name="editType" id="editTypeSeries" value="series">
                    <label for="editTypeSeries">Сериал</label>
                </div>
            </div>

            <div id="editSeriesFields" style="display:none; gap:8px; margin-bottom:8px;">
                <input type="number" id="editSeriesTotal" placeholder="Всего серий" min="1" style="flex:1;margin-bottom:0;">
                <input type="number" id="editSeriesWatched" placeholder="Просмотрено" min="0" style="flex:1;margin-bottom:0;">
            </div>

            <label style="font-size:0.65rem;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:2px;margin-bottom:4px;display:block;margin-top:8px;">Постер</label>
            <div class="add-actions">
                <input type="file" id="editImageInput" accept="image/*" hidden>
                <button type="button" class="btn-icon" id="editImageButton" onclick="document.getElementById('editImageInput').click()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="3"/>
                        <circle cx="8.5" cy="8.5" r="1.5"/>
                        <path d="M21 15l-5-5L5 21"/>
                    </svg>
                </button>
                <span style="font-size:0.7rem;color:var(--text-3);">Нажмите чтобы заменить</span>
            </div>

            <div class="btn-row">
                <button class="btn-cancel" onclick="closeEditModal()">Отмена</button>
                <button class="btn-save" onclick="saveEdit()">Сохранить</button>
            </div>
        </div>
    </div>

    <script>
        var movies = [];
        var currentFilter = 'all';
        var githubToken = '';
        var githubRepo = '';
        var dataFileSha = '';
        var isSyncing = false;
        var selectedImage = null;
        var searchTimeout = null;
        var foundMeta = null;
        var contentType = 'movie';
        var editingId = null;
        var editImageData = null;

        try {
            var local = localStorage.getItem('movies_data');
            if (local) movies = JSON.parse(local);
        } catch(e) {}

        try {
            githubToken = localStorage.getItem('gh_token') || '';
            githubRepo = localStorage.getItem('gh_repo') || '';
        } catch(e) {}

        // При клике на индикатор поиска — подставить найденное название
        function applyFoundTitle() {
            if (foundMeta && foundMeta.title) {
                document.getElementById('titleInput').value = foundMeta.title;
                showToast('Название подставлено: ' + foundMeta.title);
            }
        }

        function toggleSettings() {
            var card = document.getElementById('setupCard');
            var main = document.getElementById('mainContent');
            
            if (card.style.display === 'block') {
                card.style.display = 'none';
                if (movies.length > 0 || githubToken) {
                    main.style.display = 'block';
                }
            } else {
                card.style.display = 'block';
                if (githubToken) {
                    document.getElementById('tokenInput').value = githubToken;
                    document.getElementById('repoInput').value = githubRepo;
                    document.getElementById('logoutBtn').style.display = 'block';
                }
            }
        }

        function saveConfig() {
            var token = document.getElementById('tokenInput').value.trim();
            var repo = document.getElementById('repoInput').value.trim();
            
            if (!token || !repo) {
                showToast('Заполните оба поля');
                return;
            }

            githubToken = token;
            githubRepo = repo;

            try {
                localStorage.setItem('gh_token', githubToken);
                localStorage.setItem('gh_repo', githubRepo);
            } catch(e) {}

            document.getElementById('logoutBtn').style.display = 'block';
            showToast('Сохранено! Загружаю данные...');
            loadFromGitHub();
        }

        function logoutConfig() {
            if (confirm('Отключить синхронизацию? Локальные данные сохранятся.')) {
                githubToken = '';
                githubRepo = '';
                dataFileSha = '';
                try {
                    localStorage.removeItem('gh_token');
                    localStorage.removeItem('gh_repo');
                } catch(e) {}
                
                document.getElementById('tokenInput').value = '';
                document.getElementById('repoInput').value = '';
                document.getElementById('logoutBtn').style.display = 'none';
                document.getElementById('setupCard').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
                setSyncStatus('local');
                showToast('Синхронизация отключена');
            }
        }

        function setSyncStatus(status) {
            var dot = document.getElementById('syncDot');
            var text = document.getElementById('syncText');
            dot.className = 'sync-dot';
            if (status === 'loading') {
                dot.classList.add('loading');
                text.textContent = 'Синхронизация...';
            } else if (status === 'ok') {
                text.textContent = 'Данные синхронизированы';
            } else if (status === 'error') {
                dot.classList.add('error');
                text.textContent = 'Ошибка синхронизации';
            } else if (status === 'local') {
                text.textContent = 'Локальный режим';
            }
        }

        function loadFromGitHub() {
            if (!githubToken || !githubRepo) {
                document.getElementById('mainContent').style.display = 'block';
                setSyncStatus('local');
                render();
                return;
            }

            setSyncStatus('loading');
            document.getElementById('setupCard').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';

            var apiUrl = 'https://api.github.com/repos/' + githubRepo + '/contents/movies.json';

            fetch(apiUrl, {
                headers: {
                    'Authorization': 'token ' + githubToken,
                    'Accept': 'application/vnd.github.v3+json'
                }
            })
            .then(function(resp) {
                if (!resp.ok) throw new Error('Файл не найден');
                return resp.json();
            })
            .then(function(data) {
                dataFileSha = data.sha;
                var content = decodeURIComponent(escape(atob(data.content)));
                movies = JSON.parse(content);
                try { localStorage.setItem('movies_data', content); } catch(e) {}
                setSyncStatus('ok');
                render();
            })
            .catch(function(err) {
                console.log('Загрузка с GitHub не удалась:', err.message);
                if (movies.length > 0) {
                    setSyncStatus('local');
                } else {
                    setSyncStatus('error');
                }
                document.getElementById('setupCard').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
                render();
            });
        }

        function saveToGitHub() {
            if (!githubToken || !githubRepo) return;
            if (isSyncing) return;
            isSyncing = true;
            setSyncStatus('loading');

            var content = JSON.stringify(movies, null, 2);
            try { localStorage.setItem('movies_data', content); } catch(e) {}

            var body = {
                message: 'Обновление списка фильмов',
                content: btoa(unescape(encodeURIComponent(content)))
            };

            if (dataFileSha) {
                body.sha = dataFileSha;
            }

            fetch('https://api.github.com/repos/' + githubRepo + '/contents/movies.json', {
                method: 'PUT',
                headers: {
                    'Authorization': 'token ' + githubToken,
                    'Accept': 'application/vnd.github.v3+json',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(body)
            })
            .then(function(resp) {
                if (!resp.ok) throw new Error('Ошибка сохранения');
                return resp.json();
            })
            .then(function(data) {
                dataFileSha = data.content.sha;
                setSyncStatus('ok');
                isSyncing = false;
            })
            .catch(function(err) {
                console.error('Ошибка синхронизации:', err);
                setSyncStatus('error');
                isSyncing = false;
                showToast('Не удалось синхронизировать');
            });
        }

        function compressImage(file, maxWidth) {
            maxWidth = maxWidth || 300;
            return new Promise(function(resolve, reject) {
                var reader = new FileReader();
                reader.onload = function(e) {
                    var img = new Image();
                    img.onload = function() {
                        var canvas = document.createElement('canvas');
                        var w = img.width;
                        var h = img.height;
                        if (w > maxWidth) { h = (h * maxWidth) / w; w = maxWidth; }
                        canvas.width = w;
                        canvas.height = h;
                        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                        resolve(canvas.toDataURL('image/jpeg', 0.7));
                    };
                    img.src = e.target.result;
                };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        function searchMedia(query) {
            if (!query || query.length < 2) {
                hideSearchIndicator();
                foundMeta = null;
                return;
            }

            showSearchIndicator('Поиск информации...');
            document.getElementById('searchIndicator').classList.remove('found');
            if (searchTimeout) clearTimeout(searchTimeout);

            searchTimeout = setTimeout(function() {
                var type = contentType === 'series' ? 'tv' : 'movie';
                var url = 'https://api.themoviedb.org/3/search/' + type + '?api_key=1f54bd990f1cdfb230adb312546d765d&language=ru&query=' + encodeURIComponent(query) + '&page=1';

                fetch(url)
                    .then(function(resp) { return resp.json(); })
                    .then(function(data) {
                        if (data.results && data.results.length > 0) {
                            var result = data.results[0];
                            foundMeta = {
                                title: result.title || result.name,
                                year: (result.release_date || result.first_air_date || '').substring(0, 4),
                                overview: result.overview,
                                rating: result.vote_average,
                                posterPath: result.poster_path,
                                totalSeasons: result.number_of_seasons,
                                totalEpisodes: result.number_of_episodes
                            };

                            var statusText = 'Найдено: ' + foundMeta.title;
                            if (foundMeta.year) statusText += ' (' + foundMeta.year + ')';
                            statusText += ' — нажмите чтобы подставить';
                            showSearchIndicator(statusText);
                            document.getElementById('searchIndicator').classList.add('found');

                            if (contentType === 'series' && foundMeta.totalEpisodes) {
                                document.getElementById('seriesTotalInput').value = foundMeta.totalEpisodes;
                            }

                            if (foundMeta.posterPath && !selectedImage) {
                                var posterUrl = 'https://image.tmdb.org/t/p/w300' + foundMeta.posterPath;
                                fetch(posterUrl)
                                    .then(function(resp) { return resp.blob(); })
                                    .then(function(blob) {
                                        compressImage(blob, 200).then(function(compressed) {
                                            if (!selectedImage) {
                                                selectedImage = compressed;
                                                showImagePreview(compressed);
                                                showSearchIndicator('Постер загружен — нажмите чтобы подставить название');
                                                document.getElementById('searchIndicator').classList.add('found');
                                            }
                                        });
                                    })
                                    .catch(function() {});
                            }
                        } else {
                            foundMeta = null;
                            hideSearchIndicator();
                        }
                    })
                    .catch(function() {
                        foundMeta = null;
                        hideSearchIndicator();
                    });
            }, 600);
        }

        function showSearchIndicator(text) {
            var el = document.getElementById('searchIndicator');
            document.getElementById('searchStatus').textContent = text;
            el.classList.add('visible');
        }

        function hideSearchIndicator() {
            var el = document.getElementById('searchIndicator');
            el.classList.remove('visible');
            el.classList.remove('found');
        }

        function showImagePreview(src) {
            var area = document.getElementById('imagePreviewArea');
            var img = document.getElementById('previewImg');
            img.src = src;
            area.style.display = 'block';
            document.getElementById('imageButton').classList.add('has-image');
        }

        function clearImage() {
            selectedImage = null;
            document.getElementById('imagePreviewArea').style.display = 'none';
            document.getElementById('previewImg').src = '';
            document.getElementById('imageInput').value = '';
            document.getElementById('imageButton').classList.remove('has-image');
        }

        function showToast(msg) {
            var t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            clearTimeout(t._timer);
            t._timer = setTimeout(function() {
                t.classList.remove('show');
            }, 2000);
        }

        function addMovie() {
            var title = document.getElementById('titleInput').value.trim();
            if (!title) return;

            var exists = movies.some(function(m) {
                return m.title.toLowerCase() === title.toLowerCase();
            });

            if (exists) {
                showToast('Уже в коллекции');
                return;
            }

            var seriesTotal = null;
            var seriesWatched = 0;

            if (contentType === 'series') {
                seriesTotal = parseInt(document.getElementById('seriesTotalInput').value) || null;
                seriesWatched = parseInt(document.getElementById('seriesWatchedInput').value) || 0;
            }

            var newMovie = {
                id: Date.now(),
                title: title,
                type: contentType,
                watched: false,
                dateAdded: new Date().toLocaleDateString('ru-RU'),
                image: selectedImage,
                seriesTotal: seriesTotal,
                seriesWatched: seriesWatched,
                meta: foundMeta ? {
                    year: foundMeta.year,
                    rating: foundMeta.rating
                } : null
            };

            movies.push(newMovie);
            clearForm();
            hideSearchIndicator();
            foundMeta = null;
            render();
            saveToGitHub();
            showToast('Добавлено: ' + title);
        }

        function clearForm() {
            document.getElementById('titleInput').value = '';
            document.getElementById('seriesTotalInput').value = '';
            document.getElementById('seriesWatchedInput').value = '';
            document.getElementById('typeMovie').checked = true;
            contentType = 'movie';
            document.getElementById('seriesFields').classList.remove('visible');
            clearImage();
        }

        function toggleMovie(id) {
            var movie = movies.find(function(m) { return m.id === id; });
            if (movie) {
                movie.watched = !movie.watched;
                if (movie.type === 'series' && movie.watched && movie.seriesTotal) {
                    movie.seriesWatched = movie.seriesTotal;
                }
                if (movie.type === 'series' && !movie.watched) {
                    movie.seriesWatched = 0;
                }
                render();
                saveToGitHub();
            }
        }

        function deleteMovie(id) {
            var movie = movies.find(function(m) { return m.id === id; });
            if (movie && confirm('Удалить "' + movie.title + '"?')) {
                movies = movies.filter(function(m) { return m.id !== id; });
                render();
                saveToGitHub();
            }
        }

        function openEditModal(id) {
            var movie = movies.find(function(m) { return m.id === id; });
            if (!movie) return;

            editingId = id;
            editImageData = null;

            document.getElementById('editTitleInput').value = movie.title;

            if (movie.type === 'series') {
                document.getElementById('editTypeSeries').checked = true;
                document.getElementById('editSeriesFields').style.display = 'flex';
                document.getElementById('editSeriesTotal').value = movie.seriesTotal || '';
                document.getElementById('editSeriesWatched').value = movie.seriesWatched || 0;
            } else {
                document.getElementById('editTypeMovie').checked = true;
                document.getElementById('editSeriesFields').style.display = 'none';
            }

            document.getElementById('editImageInput').value = '';
            document.getElementById('editModal').classList.add('show');
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('show');
            editingId = null;
            editImageData = null;
        }

        function saveEdit() {
            if (!editingId) return;

            var movie = movies.find(function(m) { return m.id === editingId; });
            if (!movie) return;

            var newTitle = document.getElementById('editTitleInput').value.trim();
            if (!newTitle) {
                showToast('Название не может быть пустым');
                return;
            }

            var exists = movies.some(function(m) {
                return m.id !== editingId && m.title.toLowerCase() === newTitle.toLowerCase();
            });

            if (exists) {
                showToast('Фильм с таким названием уже есть');
                return;
            }

            movie.title = newTitle;
            movie.type = document.getElementById('editTypeSeries').checked ? 'series' : 'movie';

            if (movie.type === 'series') {
                movie.seriesTotal = parseInt(document.getElementById('editSeriesTotal').value) || null;
                movie.seriesWatched = parseInt(document.getElementById('editSeriesWatched').value) || 0;
            } else {
                movie.seriesTotal = null;
                movie.seriesWatched = 0;
            }

            if (editImageData) {
                movie.image = editImageData;
            }

            closeEditModal();
            render();
            saveToGitHub();
            showToast('Сохранено: ' + newTitle);
        }

        document.getElementById('editTypeSeries').addEventListener('change', function() {
            document.getElementById('editSeriesFields').style.display = 'flex';
        });

        document.getElementById('editTypeMovie').addEventListener('change', function() {
            document.getElementById('editSeriesFields').style.display = 'none';
        });

        document.getElementById('editImageInput').addEventListener('change', function(e) {
            var file = e.target.files[0];
            if (file) {
                if (file.size > 5 * 1024 * 1024) {
                    showToast('Файл слишком большой (макс 5 МБ)');
                    return;
                }
                compressImage(file).then(function(compressed) {
                    editImageData = compressed;
                    document.getElementById('editImageButton').classList.add('has-image');
                });
            }
        });

        function openImageModal(src) {
            var modal = document.getElementById('imageModal');
            if (!modal) {
                modal = document.createElement('div');
                modal.id = 'imageModal';
                modal.className = 'modal-overlay';
                modal.innerHTML = '<span class="modal-close">&times;</span><img src="" alt="Постер">';
                document.body.appendChild(modal);
                modal.querySelector('.modal-close').onclick = function(e) {
                    e.stopPropagation();
                    modal.classList.remove('show');
                };
                modal.onclick = function() {
                    modal.classList.remove('show');
                };
            }
            modal.querySelector('img').src = src;
            modal.classList.add('show');
        }

        function setFilter(filter, btn) {
            currentFilter = filter;
            var buttons = document.querySelectorAll('.filter-chip');
            for (var i = 0; i < buttons.length; i++) {
                buttons[i].classList.remove('active');
            }
            btn.classList.add('active');
            render();
        }

        document.getElementById('typeSeries').addEventListener('change', function() {
            contentType = 'series';
            document.getElementById('seriesFields').classList.add('visible');
            var query = document.getElementById('titleInput').value.trim();
            if (query.length >= 2) searchMedia(query);
        });

        document.getElementById('typeMovie').addEventListener('change', function() {
            contentType = 'movie';
            document.getElementById('seriesFields').classList.remove('visible');
            var query = document.getElementById('titleInput').value.trim();
            if (query.length >= 2) searchMedia(query);
        });

        document.getElementById('titleInput').addEventListener('input', function() {
            var query = this.value.trim();
            if (query.length >= 2) {
                searchMedia(query);
            } else {
                hideSearchIndicator();
                foundMeta = null;
            }
        });

        document.getElementById('titleInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                if (foundMeta && foundMeta.title) {
                    document.getElementById('titleInput').value = foundMeta.title;
                }
                addMovie();
            }
        });

        document.getElementById('imageInput').addEventListener('change', function(e) {
            var file = e.target.files[0];
            if (file) {
                if (file.size > 5 * 1024 * 1024) {
                    showToast('Файл слишком большой (макс 5 МБ)');
                    return;
                }
                if (!file.type.match(/^image\//)) {
                    showToast('Выберите изображение');
                    return;
                }
                compressImage(file).then(function(compressed) {
                    selectedImage = compressed;
                    showImagePreview(compressed);
                }).catch(function() {
                    showToast('Ошибка загрузки');
                });
            }
        });

        function render() {
            if (!document.getElementById('mainContent').style.display || 
                document.getElementById('mainContent').style.display === 'none') {
                return;
            }

            var container = document.getElementById('movieContainer');
            var filtered = movies;

            if (currentFilter === 'watched') {
                filtered = movies.filter(function(m) { return m.watched; });
            } else if (currentFilter === 'unwatched') {
                filtered = movies.filter(function(m) { return !m.watched; });
            } else if (currentFilter === 'movies') {
                filtered = movies.filter(function(m) { return m.type === 'movie'; });
            } else if (currentFilter === 'series') {
                filtered = movies.filter(function(m) { return m.type === 'series'; });
            }

            filtered.sort(function(a, b) {
                if (a.watched === b.watched) return 0;
                return a.watched ? 1 : -1;
            });

            var html = '';
            for (var i = 0; i < filtered.length; i++) {
                var m = filtered[i];
                var posterHtml;
                if (m.image) {
                    posterHtml = '<img src="' + m.image + '" class="movie-poster" alt="Постер" onclick="openImageModal(\'' + m.image + '\')">';
                } else {
                    posterHtml = '<div class="movie-poster" style="display:flex;align-items:center;justify-content:center;font-size:0.6rem;color:var(--text-3);text-transform:uppercase;letter-spacing:1px;">' + (m.type === 'series' ? 'Сер' : 'Фил') + '</div>';
                }

                var badge = m.type === 'series' ? '<span class="badge">Сериал</span>' : '<span class="badge">Фильм</span>';
                var seriesInfo = '';
                if (m.type === 'series' && m.seriesTotal) {
                    seriesInfo = ' • ' + (m.seriesWatched || 0) + '/' + m.seriesTotal + ' серий';
                }
                var yearInfo = '';
                if (m.meta && m.meta.year) {
                    yearInfo = ' • ' + m.meta.year;
                }

                html += '<div class="movie-item' + (m.watched ? ' watched' : '') + '">' +
                    posterHtml +
                    '<div class="movie-info">' +
                        '<div class="movie-name">' + escapeText(m.title) + '</div>' +
                        '<div class="movie-meta">' + badge + yearInfo + seriesInfo + ' • ' + m.dateAdded + '</div>' +
                    '</div>' +
                    '<button class="btn-sm btn-edit" onclick="openEditModal(' + m.id + ')" title="Редактировать">✎</button>' +
                    '<button class="btn-sm" onclick="toggleMovie(' + m.id + ')" title="Отметить">' + (m.watched ? '↩' : '✓') + '</button>' +
                    '<button class="btn-sm" onclick="deleteMovie(' + m.id + ')" title="Удалить">✕</button>' +
                '</div>';
            }
            container.innerHTML = html;

            var total = movies.length;
            var watched = movies.filter(function(m) { return m.watched; }).length;
            document.getElementById('statTotal').textContent = total;
            document.getElementById('statWatched').textContent = watched;
            document.getElementById('statUnwatched').textContent = total - watched;
        }

        function escapeText(text) {
            var div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        loadFromGitHub();
    </script>
</body>
</html>

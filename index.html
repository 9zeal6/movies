<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0a0b">
    <title>Коллекция фильмов</title>
    <style>
        :root {
            --bg: #0a0a0b;
            --surface: #141416;
            --surface-2: #1c1c1f;
            --text: #ececee;
            --text-2: #9d9da4;
            --text-3: #63636b;
            --accent: #b8944b;
            --accent-soft: #d4b96a;
            --r-sm: 12px;
            --r-md: 18px;
            --r-full: 100px;
            --safe-bottom: env(safe-area-inset-bottom, 16px);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            min-height: 100dvh;
            color: var(--text);
            display: flex;
            justify-content: center;
            padding: 0;
        }

        .app {
            width: 100%;
            max-width: 560px;
            padding: 28px 18px calc(28px + var(--safe-bottom));
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--text);
        }

        .sync-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 18px;
            font-size: 0.7rem;
            color: var(--text-3);
            letter-spacing: 1px;
        }

        .sync-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #4ade80;
        }

        .sync-dot.loading {
            background: #f59e0b;
            animation: pulse 1s infinite;
        }

        .sync-dot.error {
            background: #ef4444;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 16px;
        }

        .stat-card {
            background: var(--surface);
            border-radius: var(--r-md);
            padding: 12px 8px;
            text-align: center;
        }

        .stat-value {
            display: block;
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--accent);
        }

        .stat-label {
            font-size: 0.6rem;
            font-weight: 700;
            color: var(--text-3);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .filter-row {
            display: flex;
            gap: 6px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .filter-chip {
            padding: 8px 16px;
            background: var(--surface);
            color: var(--text-2);
            border: 1px solid rgba(255,255,255,0.04);
            border-radius: var(--r-full);
            cursor: pointer;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            border: none;
            font-family: inherit;
        }

        .filter-chip.active {
            color: #0a0a0b;
            background: var(--accent);
        }

        .card {
            background: var(--surface);
            border-radius: var(--r-md);
            padding: 16px;
            margin-bottom: 14px;
        }

        .card label {
            display: block;
            font-size: 0.65rem;
            font-weight: 700;
            color: var(--text-3);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 4px;
        }

        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 12px 16px;
            background: var(--surface-2);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: var(--r-full);
            color: var(--text);
            font-size: 0.85rem;
            outline: none;
            margin-bottom: 8px;
            font-family: inherit;
        }

        .radio-row {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }

        .radio-btn {
            flex: 1;
        }

        .radio-btn input {
            display: none;
        }

        .radio-btn label {
            display: block;
            padding: 10px;
            text-align: center;
            background: var(--surface-2);
            border-radius: var(--r-full);
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-2);
            cursor: pointer;
            letter-spacing: 1px;
        }

        .radio-btn input:checked + label {
            background: var(--accent);
            color: #0a0a0b;
        }

        .series-fields {
            display: none;
            gap: 8px;
            margin-bottom: 8px;
        }

        .series-fields.visible {
            display: flex;
        }

        .series-fields input {
            flex: 1;
            margin-bottom: 0;
        }

        .btn {
            width: 100%;
            padding: 13px;
            border-radius: var(--r-full);
            border: none;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 0.5px;
            font-family: inherit;
        }

        .btn-add {
            background: var(--accent);
            color: #0a0a0b;
        }

        .btn-add:active {
            background: var(--accent-soft);
        }

        .btn-add:disabled {
            opacity: 0.5;
        }

        .movie-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--surface);
            border-radius: var(--r-md);
            padding: 12px 14px;
            margin-bottom: 7px;
        }

        .movie-item.watched {
            opacity: 0.55;
        }

        .movie-poster {
            width: 40px;
            height: 56px;
            border-radius: 10px;
            object-fit: cover;
            background: var(--surface-2);
            flex-shrink: 0;
        }

        .movie-info {
            flex: 1;
            min-width: 0;
        }

        .movie-name {
            font-weight: 700;
            font-size: 0.85rem;
            word-break: break-word;
        }

        .movie-item.watched .movie-name {
            text-decoration: line-through;
            text-decoration-color: var(--accent);
        }

        .movie-meta {
            font-size: 0.65rem;
            color: var(--text-3);
            margin-top: 2px;
        }

        .badge {
            display: inline-block;
            padding: 2px 7px;
            border-radius: var(--r-full);
            background: rgba(184,148,75,0.2);
            color: var(--accent);
            font-size: 0.6rem;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .btn-sm {
            width: 34px;
            height: 34px;
            border-radius: var(--r-full);
            border: none;
            background: transparent;
            color: var(--text-3);
            font-size: 1.1rem;
            cursor: pointer;
            flex-shrink: 0;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-sm:active {
            background: rgba(200,60,60,0.2);
            color: #d47878;
        }

        .toast {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 20px;
            border-radius: var(--r-full);
            background: var(--surface-2);
            color: var(--text);
            font-size: 0.75rem;
            font-weight: 700;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            letter-spacing: 0.5px;
        }

        .toast.show {
            opacity: 1;
        }

        .setup-card {
            background: var(--surface);
            border-radius: var(--r-md);
            padding: 20px;
            text-align: center;
            margin-bottom: 14px;
        }

        .setup-card p {
            font-size: 0.8rem;
            color: var(--text-2);
            margin-bottom: 12px;
            line-height: 1.5;
        }

        .setup-card input {
            text-align: center;
            margin-bottom: 10px;
        }

        .setup-card .hint {
            font-size: 0.65rem;
            color: var(--text-3);
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="app" id="app">
        <div class="header">
            <h1>Коллекция</h1>
        </div>

        <div class="sync-bar">
            <span class="sync-dot" id="syncDot"></span>
            <span id="syncText">Загрузка...</span>
        </div>

        <div id="setupCard" class="setup-card" style="display:none;">
            <p>Для синхронизации нужен токен GitHub</p>
            <input type="text" id="tokenInput" placeholder="Вставьте токен">
            <input type="text" id="repoInput" placeholder="username/repository">
            <button class="btn btn-add" onclick="saveConfig()">Подключить</button>
            <p class="hint">Инструкция ниже</p>
        </div>

        <div id="mainContent" style="display:none;">
            <div class="stats-row">
                <div class="stat-card"><span class="stat-value" id="statTotal">0</span><span class="stat-label">Всего</span></div>
                <div class="stat-card"><span class="stat-value" id="statWatched">0</span><span class="stat-label">Просм</span></div>
                <div class="stat-card"><span class="stat-value" id="statUnwatched">0</span><span class="stat-label">В планах</span></div>
            </div>

            <div class="filter-row" id="filterRow">
                <button class="filter-chip active" onclick="setFilter('all', this)">Все</button>
                <button class="filter-chip" onclick="setFilter('unwatched', this)">К просмотру</button>
                <button class="filter-chip" onclick="setFilter('watched', this)">Просмотрено</button>
                <button class="filter-chip" onclick="setFilter('movies', this)">Фильмы</button>
                <button class="filter-chip" onclick="setFilter('series', this)">Сериалы</button>
            </div>

            <div class="card">
                <label>Название</label>
                <input type="text" id="titleInput" placeholder="Введите название" maxlength="200">

                <label>Тип</label>
                <div class="radio-row">
                    <div class="radio-btn">
                        <input type="radio" name="type" id="typeMovie" value="movie" checked>
                        <label for="typeMovie">Фильм</label>
                    </div>
                    <div class="radio-btn">
                        <input type="radio" name="type" id="typeSeries" value="series">
                        <label for="typeSeries">Сериал</label>
                    </div>
                </div>

                <div class="series-fields" id="seriesFields">
                    <input type="number" id="seriesTotalInput" placeholder="Всего серий" min="1">
                    <input type="number" id="seriesWatchedInput" placeholder="Просмотрено" min="0">
                </div>

                <button class="btn btn-add" id="addBtn" onclick="addMovie()">Добавить</button>
            </div>

            <div id="movieContainer"></div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        var movies = [];
        var currentFilter = 'all';
        var githubToken = '';
        var githubRepo = '';
        var dataFileSha = '';
        var isSyncing = false;

        // Попробовать загрузить из localStorage на случай офлайна
        try {
            var local = localStorage.getItem('movies_data');
            if (local) movies = JSON.parse(local);
        } catch(e) {}

        // Загрузка конфигурации
        try {
            githubToken = localStorage.getItem('gh_token') || '';
            githubRepo = localStorage.getItem('gh_repo') || '';
        } catch(e) {}

        function saveConfig() {
            githubToken = document.getElementById('tokenInput').value.trim();
            githubRepo = document.getElementById('repoInput').value.trim();
            
            if (!githubToken || !githubRepo) {
                showToast('Заполните оба поля');
                return;
            }

            try {
                localStorage.setItem('gh_token', githubToken);
                localStorage.setItem('gh_repo', githubRepo);
            } catch(e) {}

            showToast('Сохранено! Загружаю данные...');
            loadFromGitHub();
        }

        function setSyncStatus(status) {
            var dot = document.getElementById('syncDot');
            var text = document.getElementById('syncText');
            dot.className = 'sync-dot';
            if (status === 'loading') {
                dot.classList.add('loading');
                text.textContent = 'Синхронизация...';
            } else if (status === 'ok') {
                text.textContent = 'Данные синхронизированы';
            } else if (status === 'error') {
                dot.classList.add('error');
                text.textContent = 'Ошибка синхронизации';
            } else if (status === 'local') {
                text.textContent = 'Локальный режим';
            }
        }

        function loadFromGitHub() {
            if (!githubToken || !githubRepo) {
                document.getElementById('setupCard').style.display = 'block';
                document.getElementById('mainContent').style.display = 'none';
                setSyncStatus('local');
                render();
                return;
            }

            setSyncStatus('loading');
            document.getElementById('setupCard').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';

            var apiUrl = 'https://api.github.com/repos/' + githubRepo + '/contents/movies.json';

            fetch(apiUrl, {
                headers: {
                    'Authorization': 'token ' + githubToken,
                    'Accept': 'application/vnd.github.v3+json'
                }
            })
            .then(function(resp) {
                if (!resp.ok) throw new Error('Файл не найден');
                return resp.json();
            })
            .then(function(data) {
                dataFileSha = data.sha;
                var content = decodeURIComponent(escape(atob(data.content)));
                movies = JSON.parse(content);
                try { localStorage.setItem('movies_data', content); } catch(e) {}
                setSyncStatus('ok');
                render();
            })
            .catch(function(err) {
                console.log('Загрузка с GitHub не удалась, использую локальные данные:', err.message);
                if (movies.length > 0) {
                    setSyncStatus('local');
                } else {
                    setSyncStatus('error');
                }
                document.getElementById('setupCard').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
                render();
            });
        }

        function saveToGitHub() {
            if (!githubToken || !githubRepo) return;

            if (isSyncing) return;
            isSyncing = true;
            setSyncStatus('loading');

            var content = JSON.stringify(movies, null, 2);
            try { localStorage.setItem('movies_data', content); } catch(e) {}

            var body = {
                message: 'Обновление списка фильмов',
                content: btoa(unescape(encodeURIComponent(content)))
            };

            if (dataFileSha) {
                body.sha = dataFileSha;
            }

            fetch('https://api.github.com/repos/' + githubRepo + '/contents/movies.json', {
                method: 'PUT',
                headers: {
                    'Authorization': 'token ' + githubToken,
                    'Accept': 'application/vnd.github.v3+json',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(body)
            })
            .then(function(resp) {
                if (!resp.ok) throw new Error('Ошибка сохранения');
                return resp.json();
            })
            .then(function(data) {
                dataFileSha = data.content.sha;
                setSyncStatus('ok');
                isSyncing = false;
            })
            .catch(function(err) {
                console.error('Ошибка синхронизации:', err);
                setSyncStatus('error');
                isSyncing = false;
                showToast('Не удалось синхронизировать');
            });
        }

        function showToast(msg) {
            var t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            clearTimeout(t._timer);
            t._timer = setTimeout(function() {
                t.classList.remove('show');
            }, 2000);
        }

        function addMovie() {
            var title = document.getElementById('titleInput').value.trim();
            if (!title) return;

            var exists = movies.some(function(m) {
                return m.title.toLowerCase() === title.toLowerCase();
            });

            if (exists) {
                showToast('Уже в коллекции');
                return;
            }

            var type = document.querySelector('input[name="type"]:checked').value;
            var seriesTotal = null;
            var seriesWatched = 0;

            if (type === 'series') {
                seriesTotal = parseInt(document.getElementById('seriesTotalInput').value) || null;
                seriesWatched = parseInt(document.getElementById('seriesWatchedInput').value) || 0;
            }

            var newMovie = {
                id: Date.now(),
                title: title,
                type: type,
                watched: false,
                dateAdded: new Date().toLocaleDateString('ru-RU'),
                seriesTotal: seriesTotal,
                seriesWatched: seriesWatched
            };

            movies.push(newMovie);
            clearForm();
            render();
            saveToGitHub();
            showToast('Добавлено');
        }

        function clearForm() {
            document.getElementById('titleInput').value = '';
            document.getElementById('seriesTotalInput').value = '';
            document.getElementById('seriesWatchedInput').value = '';
            document.getElementById('typeMovie').checked = true;
            document.getElementById('seriesFields').classList.remove('visible');
        }

        function toggleMovie(id) {
            var movie = movies.find(function(m) { return m.id === id; });
            if (movie) {
                movie.watched = !movie.watched;
                if (movie.type === 'series' && movie.watched && movie.seriesTotal) {
                    movie.seriesWatched = movie.seriesTotal;
                }
                if (movie.type === 'series' && !movie.watched) {
                    movie.seriesWatched = 0;
                }
                render();
                saveToGitHub();
            }
        }

        function deleteMovie(id) {
            var movie = movies.find(function(m) { return m.id === id; });
            if (movie && confirm('Удалить "' + movie.title + '"?')) {
                movies = movies.filter(function(m) { return m.id !== id; });
                render();
                saveToGitHub();
            }
        }

        function setFilter(filter, btn) {
            currentFilter = filter;
            var buttons = document.querySelectorAll('.filter-chip');
            for (var i = 0; i < buttons.length; i++) {
                buttons[i].classList.remove('active');
            }
            btn.classList.add('active');
            render();
        }

        document.getElementById('typeSeries').addEventListener('change', function() {
            document.getElementById('seriesFields').classList.add('visible');
        });

        document.getElementById('typeMovie').addEventListener('change', function() {
            document.getElementById('seriesFields').classList.remove('visible');
        });

        document.getElementById('titleInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') addMovie();
        });

        function render() {
            if (!document.getElementById('mainContent').style.display || 
                document.getElementById('mainContent').style.display === 'none') {
                return;
            }

            var container = document.getElementById('movieContainer');
            var filtered = movies;

            if (currentFilter === 'watched') {
                filtered = movies.filter(function(m) { return m.watched; });
            } else if (currentFilter === 'unwatched') {
                filtered = movies.filter(function(m) { return !m.watched; });
            } else if (currentFilter === 'movies') {
                filtered = movies.filter(function(m) { return m.type === 'movie'; });
            } else if (currentFilter === 'series') {
                filtered = movies.filter(function(m) { return m.type === 'series'; });
            }

            filtered.sort(function(a, b) {
                if (a.watched === b.watched) return 0;
                return a.watched ? 1 : -1;
            });

            var html = '';
            for (var i = 0; i < filtered.length; i++) {
                var m = filtered[i];
                var poster = '<div class="movie-poster" style="display:flex;align-items:center;justify-content:center;font-size:1rem;color:var(--text-3);">' + (m.type === 'series' ? 'S' : 'F') + '</div>';
                var badge = m.type === 'series' ? '<span class="badge">Сериал</span>' : '<span class="badge">Фильм</span>';
                var seriesInfo = '';
                if (m.type === 'series' && m.seriesTotal) {
                    seriesInfo = ' • ' + (m.seriesWatched || 0) + '/' + m.seriesTotal + ' серий';
                }

                html += '<div class="movie-item' + (m.watched ? ' watched' : '') + '">' +
                    poster +
                    '<div class="movie-info">' +
                        '<div class="movie-name">' + escapeText(m.title) + '</div>' +
                        '<div class="movie-meta">' + badge + ' • ' + m.dateAdded + seriesInfo + '</div>' +
                    '</div>' +
                    '<button class="btn-sm" onclick="toggleMovie(' + m.id + ')">' + (m.watched ? '↩' : '✓') + '</button>' +
                    '<button class="btn-sm" onclick="deleteMovie(' + m.id + ')">✕</button>' +
                '</div>';
            }
            container.innerHTML = html;

            var total = movies.length;
            var watched = movies.filter(function(m) { return m.watched; }).length;
            document.getElementById('statTotal').textContent = total;
            document.getElementById('statWatched').textContent = watched;
            document.getElementById('statUnwatched').textContent = total - watched;
        }

        function escapeText(text) {
            var div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Запуск
        loadFromGitHub();
    </script>
</body>
</html>
